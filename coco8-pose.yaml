# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/
path: . # dataset root dir
train: images/train # train images (relative to 'path')
val: images/val # val images (relative to 'path')
test: # test images (optional)

# Keypoints
kpt_shape: [9, 3] # number of keypoints, number of dims (2 for x,y or 3 for x,y,visible)
# Add this to enable fliplr augmentation
# Assuming: 0:neck, 1:withers, 2:back, 3:hook_L, 4:hook_R, 5:hip, 6:tail, 7:pin_L, 8:pin_R
flip_idx: [0, 1, 2, 4, 3, 5, 6, 8, 7]

# Classes
names:
  0: cow

# Keypoint names per class
kpt_names:
  0:
    0: neck
    1: withers
    2: back
    3: hook_left
    4: hook_right
    5: hip_ridge
    6: tail_head
    7: pin_left
    8: pin_right
