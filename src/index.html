<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CowID - Biometria Bovina</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 { font-weight: 800; font-size: 2.5rem; margin-bottom: 10px; }
        .grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 30px;
        }
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .upload-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-zone:hover { border-color: var(--primary); background: #eff6ff; }
        .preview-img {
            width: 100%;
            border-radius: 8px;
            margin-top: 20px;
        }
        .result-badge {
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 99px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
        }
        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .metric-value { font-weight: 600; color: var(--primary); }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [file, setFile] = useState(null);
            const [preview, setPreview] = useState(null);
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleUpload = async (e) => {
                const selectedFile = e.target.files[0];
                if (!selectedFile) return;

                setFile(selectedFile);
                setPreview(URL.createObjectURL(selectedFile));
                setLoading(true);

                const formData = new FormData();
                formData.append('file', selectedFile);

                try {
                    const response = await fetch('http://localhost:8000/predict', {
                        method: 'POST',
                        body: formData,
                    });
                    const data = await response.json();
                    setResult(data);
                } catch (err) {
                    alert("Erro ao conectar com o servidor. Certifique-se que o app.py está rodando.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="container">
                    <header>
                        <h1>CowID Analyzer</h1>
                        <p>Identificação Biométrica Bovina em Tempo Real</p>
                    </header>

                    <div className="grid">
                        <div className={`card ${loading ? 'loading' : ''}`}>
                            <div className="upload-zone" onClick={() => document.getElementById('fileInput').click()}>
                                <p>Clique ou arraste uma foto (Vista Superior)</p>
                                <input 
                                    type="file" 
                                    id="fileInput" 
                                    hidden 
                                    onChange={handleUpload}
                                    accept="image/*"
                                />
                            </div>
                            {result?.image ? (
                                <img src={`data:image/jpeg;base64,${result.image}`} className="preview-img" alt="Result" />
                            ) : preview && (
                                <img src={preview} className="preview-img" alt="Preview" />
                            )}
                        </div>

                        <div className="card">
                            <h2>Resultados</h2>
                            {result && !result.error ? (
                                <div>
                                    <div className="result-badge">ID Sugerido: {result.cow_id}</div>
                                    <p>Confiança: <strong>{(result.confidence * 100).toFixed(0)}%</strong></p>
                                    
                                    <h3>Biometria Extraída</h3>
                                    {result.biometrics ? (
                                        <>
                                            <div className="metric-row">
                                                <span>Razão Pélvica</span>
                                                <span className="metric-value">{result.biometrics.pelvic_ratio?.toFixed(2) || 'N/A'}</span>
                                            </div>
                                            <div className="metric-row">
                                                <span>Ângulo Dorso</span>
                                                <span className="metric-value">{result.biometrics.angle_back?.toFixed(1) || 'N/A'}°</span>
                                            </div>
                                            <div className="metric-row">
                                                <span>Simetria Postural</span>
                                                <span className="metric-value">{result.biometrics.symmetry_idx?.toFixed(2) || 'N/A'}</span>
                                            </div>
                                            <div className="metric-row">
                                                <span>Razão de Aspecto</span>
                                                <span className="metric-value">{result.biometrics.body_aspect?.toFixed(2) || 'N/A'}</span>
                                            </div>
                                        </>
                                    ) : <p>Dados biométricos indisponíveis.</p>}
                                </div>
                            ) : result?.error ? (
                                <div style={{color: '#ef4444', fontWeight: 'bold'}}>
                                    ⚠️ {result.error}
                                </div>
                            ) : (
                                <p>Faça o upload de uma imagem para ver a análise.</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
